name: Self-Hosted CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  validate:
    runs-on: [self-hosted, Linux, X64]
    environment: Production
    env:
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN || '' }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME || 'admin' }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'password' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "BLOB_READ_WRITE_TOKEN=${{ secrets.BLOB_READ_WRITE_TOKEN }}" >> .env
          echo "ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}" >> .env
          echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> .env

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync

      - name: Validate source compiles
        run: uv run python -m compileall .

      - name: Restart service
        run: | 
          sudo systemctl restart chessbot.service
