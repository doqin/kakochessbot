name: Self-Hosted CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync

      - name: Validate source compiles
        run: uv run python -m compileall .
